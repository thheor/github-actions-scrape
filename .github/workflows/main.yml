name: Hourly Quote Scraper

on:
  schedule:
    - cron: "0 * * * *" # Runs at the start of every hour
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allows the bot to save the CSV back to your repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scrape.py # Make sure your file is named main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add quotes.csv
          git commit -m "Update quotes.csv [automated]" || echo "No changes to commit"
          git push
